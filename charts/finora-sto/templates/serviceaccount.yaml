{{/*
ServiceAccounts:
  - chart-level SA: when .Values.serviceAccount.create is true. Uses .Values.global.esoRoleArn (legacy single-IRSA pattern, kept for parity with custody chart).
  - per-service SA: when a service has .serviceAccount.create=true. Allows distinct IRSA role per service (STO uses this for backend/worker → finora-sto-media-{env} IRSA).
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "finora-sto.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "finora-sto.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.global.esoRoleArn }}
{{- end }}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.serviceAccount $svc.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $svc.serviceAccount.name | default $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "finora-sto.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  {{- with $svc.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
