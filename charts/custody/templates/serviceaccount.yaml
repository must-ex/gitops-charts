{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "custody.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "custody.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.global.esoRoleArn }}
{{- end }}
