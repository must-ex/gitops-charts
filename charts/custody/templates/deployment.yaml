{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "custody.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  {{- if $svc.reloader }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "custody.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "custody.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
      {{- if $svc.reloader }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      serviceAccountName: {{ include "custody.serviceAccountName" $ }}
      securityContext:
        {{- mergeOverwrite (deepCopy ($.Values.securityContext.pod | default dict)) ($svc.podSecurityContext | default dict) | toYaml | nindent 8 }}
      {{- if $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml $svc.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $svc.tolerations }}
      tolerations:
        {{- toYaml $svc.tolerations | nindent 8 }}
      {{- end }}
      {{- if $svc.affinity }}
      affinity:
        {{- toYaml $svc.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- mergeOverwrite (deepCopy ($.Values.securityContext.container | default dict)) ($svc.securityContext | default dict) | toYaml | nindent 12 }}
          {{- if $svc.command }}
          command:
            {{- toYaml $svc.command | nindent 12 }}
          {{- end }}
          {{- if $svc.args }}
          args:
            {{- toYaml $svc.args | nindent 12 }}
          {{- end }}
          {{- if $svc.containerPort }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          {{- end }}
          {{- if $svc.envFrom }}
          envFrom:
            {{- toYaml $svc.envFrom | nindent 12 }}
          {{- end }}
          {{- if $svc.env }}
          env:
            {{- toYaml $svc.env | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- if $svc.probes }}
          {{- if $svc.probes.startup }}
          startupProbe:
            {{- toYaml $svc.probes.startup | nindent 12 }}
          {{- end }}
          {{- if $svc.probes.liveness }}
          livenessProbe:
            {{- toYaml $svc.probes.liveness | nindent 12 }}
          {{- end }}
          {{- if $svc.probes.readiness }}
          readinessProbe:
            {{- toYaml $svc.probes.readiness | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if $svc.volumeMounts }}
          volumeMounts:
            {{- toYaml $svc.volumeMounts | nindent 12 }}
          {{- end }}
      {{- if $svc.volumes }}
      volumes:
        {{- toYaml $svc.volumes | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
