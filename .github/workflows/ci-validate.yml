name: ci-validate

on:
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/ci-validate.yml'
  push:
    branches: [main]
    paths:
      - 'charts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Detect changed charts
        id: charts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'charts/*' | awk -F/ 'NF>=2 {print "charts/"$2}' | sort -u | tr '\n' ' ')
          # Filter to actual existing chart directories (drop deleted)
          KEEP=""
          for c in $CHANGED; do
            if [ -d "$c" ]; then KEEP="$KEEP $c"; fi
          done
          KEEP=$(echo "$KEEP" | sed 's/^ //')
          echo "list=$KEEP" >> $GITHUB_OUTPUT
          echo "Changed charts to validate: $KEEP"

      - name: helm lint
        if: steps.charts.outputs.list != ''
        run: |
          for chart in ${{ steps.charts.outputs.list }}; do
            echo "::group::helm lint $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

      - name: helm template (smoke render with default values)
        if: steps.charts.outputs.list != ''
        run: |
          for chart in ${{ steps.charts.outputs.list }}; do
            echo "::group::helm template $chart"
            helm template test-release "$chart" > /tmp/manifest.yaml
            echo "::endgroup::"
          done

      - name: Install kubeconform
        if: steps.charts.outputs.list != ''
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: kubeconform schema validation
        if: steps.charts.outputs.list != ''
        run: |
          for chart in ${{ steps.charts.outputs.list }}; do
            echo "::group::kubeconform $chart"
            helm template test-release "$chart" \
              | kubeconform -strict -ignore-missing-schemas -summary
            echo "::endgroup::"
          done
